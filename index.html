        class="section-label"
        style="text-align: center; color: rgba(201, 168, 76, 0.8)"

      ></p>

      <div class="title-line center" style="margin: 0 auto 2.5rem"></div>

      <div class="contact-grid">
        <!-- Informations de contact -->
        <div class="fade-in">
          <p
            style="
              color: rgba(255, 255, 255, 0.65);
              margin-bottom: 2rem;
              font-size: 1.05rem;
            "
            data-i18n="contact_intro"
          ></p>
          <div class="contact-info-items">
            <!-- Téléphone / WhatsApp -->
            <div class="contact-info-item">
              <div class="contact-icon">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#C9A84C"
                  stroke-width="2"
                >
                  <path
                    d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 11a19.79 19.79 0 01-3.07-8.67A2 2 0 012 .18h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"
                  />
                </svg>
              </div>
              <div>
                <div
                  class="contact-info-label"
                  data-i18n="ci_phone_label"
                ></div>
                <div class="contact-info-value">
                  <a
                    id="tel-link"
                    href="tel:+213793259517"
                    style="
                      color: inherit;
                      text-decoration: none;
                      border-bottom: 1px dotted rgba(255, 255, 255, 0.3);
                    "
                  >
                    07 93 25 95 17 </a
                  ><br />
                  <a
                    id="wa-inline-link"
                    href="#"
                    target="_blank"
                    rel="noopener"
                    style="
                      color: var(--gold);
                      font-size: 0.85rem;
                      text-decoration: none;
                    "
                  >
                     WHATSAPP
                  </a>
                </div>
              </div>
            </div>

            <!-- Adresse -->
            <div class="contact-info-item">
              <div class="contact-icon">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#C9A84C"
                  stroke-width="2"
                >
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" />
                  <circle cx="12" cy="10" r="3" />
                </svg>
              </div>
              <div>
                <div class="contact-info-label" data-i18n="ci_addr_label"></div>
                <div
                  class="contact-info-value"
                  data-i18n-html="ci_addr_value"
                ></div>
              </div>
            </div>

            <!-- Cours en ligne -->
            <div class="contact-info-item">
              <div class="contact-icon">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#C9A84C"
                  stroke-width="2"
                >
                  <rect x="2" y="3" width="20" height="14" rx="2" />
                  <path d="M8 21h8M12 17v4" />
                </svg>
              </div>
              <div>
                <div
                  class="contact-info-label"
                  data-i18n="ci_online_label"
                ></div>
                <div

            </div>

        <!-- Formulaire de contact -->
        <div class="contact-form-card fade-in">

          <div class="form-group" id="fg-name">
